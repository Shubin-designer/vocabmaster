    rel="stylesheet">
  <script>
    // Применяем тему до загрузки React чтобы избежать мигания
    (function () {
      const theme = localStorage.getItem('vocabmaster_theme') || 'light';
      const isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (isDark) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
